# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: las-rocas-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_SSL
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: LOG_LEVEL
        value: info
